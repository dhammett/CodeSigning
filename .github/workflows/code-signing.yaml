name: code-signing
run-name: Code Signing
on:
  pull_request_review:
    types:
      - submitted
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  code-signing-labeler:
    name: code-signing-labeler
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: code-signing-labeler
        uses: actions/labeler@v6
  
  code-signing:
    name: code-signing
    needs: code-signing-labeler
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Check for Label
        id: check_label
        shell: pwsh
        run: |
          $result = gh pr view --json labels
          $result = $result | ConvertFrom-Json
          $officemacrosigning = $result.labels.name -contains "office-macro-signing"
          $rdpsigning = $result.labels.name -contains "rdp-signing"
          $signing = $officemacrosigning -or $rdpsigning

          "officemacrosigning=$officemacrosigning" >> $env:GITHUB_OUTPUT
          "rdpsigning=$rdpsigning" >> $env:GITHUB_OUTPUT
          "signing=$signing" >> $env:GITHUB_OUTPUT
      - name: Install Certificates
        if: steps.check_label.outputs.signing == 'true'
        shell: pwsh
        run: .github/scripts/InstallCertificates.ps1 -RootCert '${{ secrets.ROOT_CERT }}'
      - name: Azure Login via OIDC
        if: steps.check_label.outputs.signing == 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true
      - name: Install Prerequisites
        if: steps.check_label.outputs.officemacrosigning == 'true'
        shell: pwsh
        run: .github/scripts/InstallPrerequisites.ps1 -Latest
      - name: Sign Office Macros
        if: steps.check_label.outputs.officemacrosigning == 'true'
        shell: pwsh
        run: .github/scripts/CodeSigning.ps1 -TenantId '${{ secrets.AZURE_TENANT_ID }}' -KeyVaultUrl '${{ secrets.CODE_SIGNING_KEYVAULT }}' -CertName '${{ vars.CODE_SIGNING_CERT_NAME }}' -Path 'Office' -FileExtension '.docm','.dotm','.pptm','.potm','.ppsm','.ppam','.xlsm','.xltm'
      - name: RDP Signing
        if: steps.check_label.outputs.rdpsigning == 'true'
        uses: azure/powershell@v3
        with:
          inlineScript: .github/scripts/RDPSigning.ps1 -TenantId '${{ secrets.AZURE_TENANT_ID }}' -KeyVaultUrl '${{ secrets.CODE_SIGNING_KEYVAULT }}' -CertName '${{ secrets.CODE_SIGNING_CERT_NAME }}' -Path 'RDP'
          azPSVersion: 'latest'
      - name: Commit changes to GitHub
        if: steps.check_label.outputs.signing == 'true'
        shell: pwsh
        run: |
          git config --local user.name "GitHub Actions[bot]"
          git config --local user.email "github-actions@users.noreply.github.com"
          git add *
          git commit -m "GitHub Action files signed"
          git push
